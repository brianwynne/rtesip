name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=7,<9"

      - name: Run tests
        run: pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-release:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Create release bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUNDLE_NAME="sip-reporter-${VERSION}-noarch.tar.gz"

          mkdir -p staging/frontend/dist
          cp -r src/ staging/src/
          cp run.py staging/
          cp requirements.txt staging/
          cp -r frontend/dist/ staging/frontend/dist/
          cp -r deploy/ staging/deploy/
          cp -r boot/ staging/boot/
          cp -r scripts/ staging/scripts/

          echo "${VERSION}" > staging/VERSION

          tar -czf "${BUNDLE_NAME}" -C staging .
          echo "BUNDLE_NAME=${BUNDLE_NAME}" >> "$GITHUB_ENV"

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_NAME }}

  build-pi-image:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin rsync grep xz-utils curl xxd \
            file git kmod bc gpg pigz qemu-user-static binfmt-support

      - name: Clone pi-gen
        run: git clone --depth 1 --branch master https://github.com/RPi-Distro/pi-gen.git

      - name: Prepare custom stage
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Create our custom stage inside pi-gen
          STAGE="pi-gen/stage-sip-reporter"
          mkdir -p "${STAGE}/00-install/files/opt/rtesip"

          # Copy application
          cp -r src/ "${STAGE}/00-install/files/opt/rtesip/src/"
          cp run.py "${STAGE}/00-install/files/opt/rtesip/"
          cp requirements.txt "${STAGE}/00-install/files/opt/rtesip/"
          mkdir -p "${STAGE}/00-install/files/opt/rtesip/frontend/dist"
          cp -r frontend/dist/ "${STAGE}/00-install/files/opt/rtesip/frontend/dist/"
          cp -r deploy/conf/ "${STAGE}/00-install/files/opt/rtesip/conf/"
          echo "${VERSION}" > "${STAGE}/00-install/files/opt/rtesip/VERSION"

          # Systemd service
          mkdir -p "${STAGE}/00-install/files/etc/systemd/system"
          cp deploy/systemd/rtesip.service "${STAGE}/00-install/files/etc/systemd/system/"

          # ALSA config
          mkdir -p "${STAGE}/00-install/files/etc"
          cp deploy/conf/asound.conf "${STAGE}/00-install/files/etc/asound.conf"

          # Packages
          cat > "${STAGE}/00-install/00-packages" << 'EOF'
          python3-venv
          python3-pip
          ufw
          alsa-utils
          chrony
          EOF

          # Run script
          cat > "${STAGE}/00-install/01-run.sh" << 'SCRIPT'
          #!/bin/bash -e
          on_chroot << CHEOF
          useradd -r -s /usr/sbin/nologin -d /opt/rtesip rtesip 2>/dev/null || true
          mkdir -p /etc/rtesip /var/lib/rtesip /var/log/rtesip /run/rtesip
          chown rtesip:rtesip /var/lib/rtesip /var/log/rtesip /run/rtesip
          echo "d /run/rtesip 0755 rtesip rtesip -" > /etc/tmpfiles.d/rtesip.conf
          python3 -m venv /opt/rtesip/.venv
          /opt/rtesip/.venv/bin/pip install --upgrade pip
          /opt/rtesip/.venv/bin/pip install -r /opt/rtesip/requirements.txt
          chown -R root:root /opt/rtesip
          chown rtesip:rtesip /var/lib/rtesip /var/log/rtesip
          systemctl enable rtesip.service
          echo "sip-reporter" > /etc/hostname
          sed -i "s/raspberrypi/sip-reporter/g" /etc/hosts
          systemctl disable dphys-swapfile 2>/dev/null || true
          systemctl disable bluetooth 2>/dev/null || true
          systemctl disable triggerhappy 2>/dev/null || true
          CHEOF
          SCRIPT
          chmod +x "${STAGE}/00-install/01-run.sh"

          # Export marker
          touch "${STAGE}/EXPORT_IMAGE"

          # Skip image export on earlier stages
          touch pi-gen/stage0/SKIP_IMAGES
          touch pi-gen/stage1/SKIP_IMAGES
          touch pi-gen/stage2/SKIP_IMAGES

          # Remove stages 3-5
          rm -rf pi-gen/stage3 pi-gen/stage4 pi-gen/stage5

          # Configure pi-gen
          cat > pi-gen/config << CONF
          IMG_NAME=sip-reporter-${VERSION}
          RELEASE=bookworm
          TARGET_HOSTNAME=sip-reporter
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=T3chn0l0gy
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_IE.UTF-8
          KEYBOARD_KEYMAP=gb
          KEYBOARD_LAYOUT="English (UK)"
          TIMEZONE_DEFAULT=Europe/Dublin
          WPA_COUNTRY=IE
          STAGE_LIST="stage0 stage1 stage2 stage-sip-reporter"
          CONF

      - name: Build image
        working-directory: pi-gen
        run: sudo ./build.sh

      - name: Compress image
        run: |
          VERSION="${GITHUB_REF_NAME}"
          IMAGE=$(find pi-gen/deploy -name "*.img" | head -1)
          if [ -z "$IMAGE" ]; then
            echo "No image found!"
            ls -la pi-gen/deploy/ || true
            exit 1
          fi
          xz -T0 -6 "${IMAGE}"
          XZ_PATH="${IMAGE}.xz"
          FINAL_NAME="sip-reporter-${VERSION}.img.xz"
          mv "${XZ_PATH}" "${FINAL_NAME}"
          echo "IMAGE_PATH=${FINAL_NAME}" >> "$GITHUB_ENV"

      - name: Upload Pi image to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_PATH }}
