name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=7,<9"

      - name: Run tests
        run: pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-release:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Create release bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUNDLE_NAME="sip-reporter-${VERSION}-noarch.tar.gz"

          mkdir -p staging/frontend/dist
          cp -r src/ staging/src/
          cp run.py staging/
          cp requirements.txt staging/
          cp -r frontend/dist/ staging/frontend/dist/
          cp -r deploy/ staging/deploy/
          cp -r boot/ staging/boot/
          cp -r scripts/ staging/scripts/

          echo "${VERSION}" > staging/VERSION

          tar -czf "${BUNDLE_NAME}" -C staging .
          echo "BUNDLE_NAME=${BUNDLE_NAME}" >> "$GITHUB_ENV"

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_NAME }}

  build-pi-image:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Prepare custom pi-gen stage
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Create stage directory with pi-gen naming convention
          STAGE="custom-stage"
          mkdir -p "${STAGE}/00-install-sip-reporter/files/opt/rtesip"

          # Copy application
          cp -r src/ "${STAGE}/00-install-sip-reporter/files/opt/rtesip/src/"
          cp run.py "${STAGE}/00-install-sip-reporter/files/opt/rtesip/"
          cp requirements.txt "${STAGE}/00-install-sip-reporter/files/opt/rtesip/"
          mkdir -p "${STAGE}/00-install-sip-reporter/files/opt/rtesip/frontend/dist"
          cp -r frontend/dist/ "${STAGE}/00-install-sip-reporter/files/opt/rtesip/frontend/dist/"
          cp -r deploy/conf/ "${STAGE}/00-install-sip-reporter/files/opt/rtesip/conf/"
          mkdir -p "${STAGE}/00-install-sip-reporter/files/opt/rtesip/boot/splash"
          test -f boot/splash/splash.sh && cp boot/splash/splash.sh "${STAGE}/00-install-sip-reporter/files/opt/rtesip/boot/splash/" || true
          echo "${VERSION}" > "${STAGE}/00-install-sip-reporter/files/opt/rtesip/VERSION"

          # Systemd service
          mkdir -p "${STAGE}/00-install-sip-reporter/files/etc/systemd/system"
          cp deploy/systemd/rtesip.service "${STAGE}/00-install-sip-reporter/files/etc/systemd/system/"

          # ALSA config
          mkdir -p "${STAGE}/00-install-sip-reporter/files/etc"
          cp deploy/conf/asound.conf "${STAGE}/00-install-sip-reporter/files/etc/asound.conf"

          # Packages
          cat > "${STAGE}/00-install-sip-reporter/00-packages" << 'EOF'
          python3-venv
          python3-pip
          ufw
          alsa-utils
          chrony
          EOF

          # Install script (runs inside chroot)
          cat > "${STAGE}/00-install-sip-reporter/01-run.sh" << 'SCRIPT'
          #!/bin/bash -e
          on_chroot << 'CHEOF'
          useradd -r -s /usr/sbin/nologin -d /opt/rtesip rtesip 2>/dev/null || true
          mkdir -p /etc/rtesip /var/lib/rtesip /var/log/rtesip /run/rtesip
          chown rtesip:rtesip /var/lib/rtesip /var/log/rtesip /run/rtesip
          echo "d /run/rtesip 0755 rtesip rtesip -" > /etc/tmpfiles.d/rtesip.conf
          python3 -m venv /opt/rtesip/.venv
          /opt/rtesip/.venv/bin/pip install --upgrade pip
          /opt/rtesip/.venv/bin/pip install -r /opt/rtesip/requirements.txt
          chown -R root:root /opt/rtesip
          chown rtesip:rtesip /var/lib/rtesip /var/log/rtesip
          systemctl enable rtesip.service
          echo "sip-reporter" > /etc/hostname
          sed -i 's/raspberrypi/sip-reporter/g' /etc/hosts
          ufw --force enable
          ufw default deny incoming
          ufw default allow outgoing
          ufw allow 22/tcp
          ufw allow 80/tcp
          ufw allow 52002/udp
          systemctl disable dphys-swapfile 2>/dev/null || true
          systemctl disable bluetooth 2>/dev/null || true
          systemctl disable triggerhappy 2>/dev/null || true
          CHEOF
          SCRIPT
          chmod +x "${STAGE}/00-install-sip-reporter/01-run.sh"

      - name: Build Pi image
        uses: usimd/pi-gen-action@v1
        id: pi-gen
        with:
          image-name: sip-reporter-${{ github.ref_name }}
          stage-list: stage0 stage1 stage2 ./custom-stage
          export-last-stage-only: true
          hostname: sip-reporter
          locale: en_IE.UTF-8
          keyboard-keymap: gb
          keyboard-layout: English (UK)
          timezone: Europe/Dublin
          username: pi
          password: T3chn0l0gy
          enable-ssh: 1
          wpa-country: IE
          release: bookworm
          verbose-output: true
          enable-noobs: false
          pi-gen-version: arm64
          extra-host-modules: binfmt_misc

      - name: Compress image
        run: |
          IMAGE_PATH="${{ steps.pi-gen.outputs.image-path }}"
          xz -T0 -9 "${IMAGE_PATH}"
          XZ_PATH="${IMAGE_PATH}.xz"
          echo "IMAGE_NAME=$(basename ${XZ_PATH})" >> "$GITHUB_ENV"
          echo "IMAGE_PATH=${XZ_PATH}" >> "$GITHUB_ENV"

      - name: Upload Pi image to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_PATH }}
