name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-release:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Create release bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUNDLE_NAME="sip-reporter-${VERSION}-${{ matrix.arch }}.tar.gz"

          mkdir -p staging/frontend/dist
          cp -r src/ staging/src/
          cp run.py staging/
          cp requirements.txt staging/
          cp -r frontend/dist/ staging/frontend/dist/
          cp -r deploy/ staging/deploy/
          cp -r boot/ staging/boot/
          cp -r scripts/ staging/scripts/

          tar -czf "${BUNDLE_NAME}" -C staging .
          echo "BUNDLE_NAME=${BUNDLE_NAME}" >> "$GITHUB_ENV"

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_NAME }}
