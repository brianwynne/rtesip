name: Build Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pytest>=7,<9"

      - name: Run tests
        run: pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-release:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Create release bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUNDLE_NAME="sip-reporter-${VERSION}-noarch.tar.gz"

          mkdir -p staging/frontend/dist
          cp -r src/ staging/src/
          cp run.py staging/
          cp requirements.txt staging/
          cp -r frontend/dist/ staging/frontend/dist/
          cp -r deploy/ staging/deploy/
          cp -r boot/ staging/boot/
          cp -r scripts/ staging/scripts/

          echo "${VERSION}" > staging/VERSION

          tar -czf "${BUNDLE_NAME}" -C staging .
          echo "BUNDLE_NAME=${BUNDLE_NAME}" >> "$GITHUB_ENV"

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BUNDLE_NAME }}

  build-pi-image:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted debootstrap zerofree zip \
            dosfstools libarchive-tools libcap2-bin rsync grep xz-utils curl xxd \
            file git kmod bc gpg pigz qemu-user-static binfmt-support arch-test

      - name: Clone pi-gen
        run: git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git

      - name: Patch pi-gen to accept qemu-user-static
        run: |
          # pi-gen checks for qemu-user-binfmt but qemu-user-static provides the same functionality
          # with static binaries that work in chroots
          sed -i 's/qemu-user-binfmt/qemu-user-static/g' pi-gen/depends

      - name: Prepare pi-gen config
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Remove stages 3-5
          rm -rf pi-gen/stage3 pi-gen/stage4 pi-gen/stage5

          # Export only stage2
          touch pi-gen/stage0/SKIP_IMAGES
          touch pi-gen/stage1/SKIP_IMAGES
          touch pi-gen/stage2/EXPORT_IMAGE

          # Configure pi-gen
          cat > pi-gen/config << CONF
          IMG_NAME=sip-reporter-${VERSION}
          RELEASE=bookworm
          TARGET_HOSTNAME=sip-reporter
          FIRST_USER_NAME=pi
          FIRST_USER_PASS=T3chn0l0gy
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_IE.UTF-8
          KEYBOARD_KEYMAP=gb
          KEYBOARD_LAYOUT="English (UK)"
          TIMEZONE_DEFAULT=Europe/Dublin
          WPA_COUNTRY=IE
          STAGE_LIST="stage0 stage1 stage2"
          CONF

      - name: Build base image
        working-directory: pi-gen
        run: sudo ./build.sh

      - name: Inject SIP Reporter into image
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Find the built image
          IMAGE=$(find pi-gen/deploy -name "*.img" | head -1)
          if [ -z "$IMAGE" ]; then
            echo "ERROR: No image found in pi-gen/deploy/"
            ls -la pi-gen/deploy/ || true
            exit 1
          fi
          echo "Found image: $IMAGE"

          # Mount the image (partition 2 = rootfs)
          OFFSET=$(fdisk -l "$IMAGE" | grep "Linux" | awk '{print $2}')
          MOUNT_DIR=$(mktemp -d)
          sudo mount -o loop,offset=$((OFFSET * 512)) "$IMAGE" "$MOUNT_DIR"
          echo "Mounted rootfs at: $MOUNT_DIR"

          # Copy application files
          sudo mkdir -p "$MOUNT_DIR/opt/rtesip"
          sudo cp -r src/ "$MOUNT_DIR/opt/rtesip/src/"
          sudo cp run.py "$MOUNT_DIR/opt/rtesip/"
          sudo cp requirements.txt "$MOUNT_DIR/opt/rtesip/"
          sudo mkdir -p "$MOUNT_DIR/opt/rtesip/frontend/dist"
          sudo cp -r frontend/dist/ "$MOUNT_DIR/opt/rtesip/frontend/dist/"
          sudo cp -r deploy/conf/ "$MOUNT_DIR/opt/rtesip/conf/"
          echo "${VERSION}" | sudo tee "$MOUNT_DIR/opt/rtesip/VERSION"

          # Systemd service
          sudo cp deploy/systemd/rtesip.service "$MOUNT_DIR/etc/systemd/system/"

          # ALSA config
          sudo cp deploy/conf/asound.conf "$MOUNT_DIR/etc/asound.conf"

          # Create setup script
          cat > /tmp/setup.sh << 'SETUP'
#!/bin/bash -e
useradd -r -s /usr/sbin/nologin -d /opt/rtesip rtesip 2>/dev/null || true
mkdir -p /etc/rtesip /var/lib/rtesip /var/log/rtesip /run/rtesip
chown rtesip:rtesip /var/lib/rtesip /var/log/rtesip /run/rtesip
echo "d /run/rtesip 0755 rtesip rtesip -" > /etc/tmpfiles.d/rtesip.conf
python3 -m venv /opt/rtesip/.venv
/opt/rtesip/.venv/bin/pip install --upgrade pip
/opt/rtesip/.venv/bin/pip install -r /opt/rtesip/requirements.txt
chown -R root:root /opt/rtesip
chown rtesip:rtesip /var/lib/rtesip /var/log/rtesip
systemctl enable rtesip.service
echo "sip-reporter" > /etc/hostname
sed -i "s/raspberrypi/sip-reporter/g" /etc/hosts
systemctl disable dphys-swapfile 2>/dev/null || true
systemctl disable bluetooth 2>/dev/null || true
systemctl disable triggerhappy 2>/dev/null || true
SETUP
          sudo cp /tmp/setup.sh "$MOUNT_DIR/tmp/setup.sh"
          sudo chmod +x "$MOUNT_DIR/tmp/setup.sh"

          # Chroot and run setup
          sudo cp /usr/bin/qemu-aarch64-static "$MOUNT_DIR/usr/bin/" 2>/dev/null || true
          sudo mount -t proc proc "$MOUNT_DIR/proc"
          sudo mount -t sysfs sysfs "$MOUNT_DIR/sys"
          sudo mount --bind /dev "$MOUNT_DIR/dev"
          sudo mount --bind /dev/pts "$MOUNT_DIR/dev/pts"
          sudo chroot "$MOUNT_DIR" /tmp/setup.sh || echo "WARNING: chroot setup had errors (non-fatal on CI)"
          sudo rm -f "$MOUNT_DIR/tmp/setup.sh" "$MOUNT_DIR/usr/bin/qemu-aarch64-static"

          # Unmount
          sudo umount "$MOUNT_DIR/dev/pts" 2>/dev/null || true
          sudo umount "$MOUNT_DIR/dev" 2>/dev/null || true
          sudo umount "$MOUNT_DIR/sys" 2>/dev/null || true
          sudo umount "$MOUNT_DIR/proc" 2>/dev/null || true
          sudo umount "$MOUNT_DIR"
          rmdir "$MOUNT_DIR"

          echo "SIP Reporter injected into image successfully"

      - name: Compress image
        run: |
          VERSION="${GITHUB_REF_NAME}"
          IMAGE=$(find pi-gen/deploy -name "*.img" | head -1)
          if [ -z "$IMAGE" ]; then
            echo "No image found!"
            ls -la pi-gen/deploy/ || true
            exit 1
          fi
          xz -T0 -6 "${IMAGE}"
          XZ_PATH="${IMAGE}.xz"
          FINAL_NAME="sip-reporter-${VERSION}.img.xz"
          mv "${XZ_PATH}" "${FINAL_NAME}"
          echo "IMAGE_PATH=${FINAL_NAME}" >> "$GITHUB_ENV"

      - name: Upload Pi image to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_PATH }}
