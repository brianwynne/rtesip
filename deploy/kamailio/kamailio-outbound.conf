# ============================================================
# Kamailio RFC 5626 Outbound Configuration for SIP Reporter
# ============================================================
#
# Apply these changes to /etc/kamailio/kamailio.cfg on sip.rtegroup.ie
# This is NOT a complete config — merge into the existing kamailio.cfg
#
# Purpose: Enable multi-flow registration so SIP Reporter devices can
# register from two interfaces (ethernet + WiFi) simultaneously.
# Kamailio stores both flows and fails over automatically.
#
# ============================================================


# ── STEP 1: Add module loads ──────────────────────────────────
#
# Add these AFTER the existing module loads (after loadmodule "rtpengine.so")
# The outbound module must load AFTER tm and sl
#
#   loadmodule "outbound.so"
#   loadmodule "path.so"


# ── STEP 2: Module parameters ────────────────────────────────
#
# Add/modify these parameters in the modparam section:

# Registrar — enable RFC 5626 outbound
#   modparam("registrar", "outbound_mode", 1)
#   modparam("registrar", "flow_timer", 30)
#   modparam("registrar", "max_contacts", 4)       # was 2 — need room for 2 flows × 2 devices
#   modparam("registrar", "use_path", 1)
#   modparam("registrar", "path_mode", 0)
#   modparam("registrar", "gruu_enabled", 1)

# Path module
#   modparam("path", "use_received", 1)

# usrloc — ensure desc_time_order for newest-first lookup
#   modparam("usrloc", "desc_time_order", 1)

# TM — failure route timeout (how long to wait before trying next flow)
#   modparam("tm", "fr_timer", 5000)               # 5 seconds INVITE timeout
#   modparam("tm", "fr_inv_timer", 30000)           # 30 seconds overall INVITE timeout


