# ── STEP 5: NAT keepalive ────────────────────────────────────
#
# The flow_timer=30 tells the client to send keepalives every 30 seconds.
# pjsua handles this automatically when RFC 5626 is enabled.
# No additional server-side keepalive config needed.


# ── STEP 6: Verify ───────────────────────────────────────────
#
# After applying, check that dual registration works:
#
#   mysql -u kamailio -p877807 kamailio \
#     -e "SELECT username, contact, socket, reg_id, instance FROM location WHERE username='tieline1'"
#
# Should show 2 rows with:
#   - Same username and instance
#   - Different contact IPs
#   - reg_id=1 and reg_id=2
#
# Test failover:
#   kamcmd ul.lookup location tieline1
#   # Should show both contacts
