#!KAMAILIO

  ####### Global Parameters #########

  debug=3
  log_stderror=no
  fork=yes
  children=4
  enable_tls=1

  listen=tls:0.0.0.0:5061 advertise 54.220.131.205:5061
  alias="sip.rtegroup.ie"

  #!define WITH_TLS

  # Tunnel subnet: 10.7.0.0/24
  #!substdef "!TUNNEL_NET!10.7.0.!g"

  ####### Modules ########

  loadmodule "tm.so"
  loadmodule "jsonrpcs.so"
  modparam("jsonrpcs", "fifo_name", "/run/kamailio/kamailio_rpc.fifo")

  loadmodule "sl.so"
  loadmodule "tls.so"
  loadmodule "rr.so"
  loadmodule "maxfwd.so"
  loadmodule "sanity.so"
  loadmodule "textops.so"
  loadmodule "sdpops.so"
  loadmodule "xlog.so"
  loadmodule "pv.so"
  loadmodule "siputils.so"
  loadmodule "usrloc.so"
  loadmodule "registrar.so"
  loadmodule "auth.so"
  loadmodule "auth_db.so"
  loadmodule "db_mysql.so"
  loadmodule "nathelper.so"
  loadmodule "rtpengine.so"
  loadmodule "uac.so"

  modparam("tls", "config", "/etc/kamailio/tls.cfg")

  ####### Module Parameters ########

  modparam("auth_db", "db_url", "mysql://kamailio:877807@localhost/kamailio")
  modparam("auth_db", "calculate_ha1", 1)
  modparam("auth_db", "password_column", "password")
  modparam("auth_db", "use_domain", 1)

  modparam("usrloc", "db_url", "mysql://kamailio:877807@localhost/kamailio")
  modparam("usrloc", "db_timer_clean", 1)
  modparam("usrloc", "timer_interval", 60)
  modparam("usrloc", "db_mode", 3)
  modparam("usrloc", "use_domain", 1)

  modparam("registrar", "received_avp", "$avp(received)")
  modparam("registrar", "method_filtering", 1)
  modparam("registrar", "max_contacts", 2)
  modparam("registrar", "default_expires", 3600)
  modparam("registrar", "max_expires", 3600)

  modparam("rr", "enable_full_lr", 1)
  modparam("rr", "append_fromtag", 1)

  modparam("tm", "auto_inv_100_reason", "Trying")

  modparam("rtpengine", "rtpengine_sock", "udp:localhost:2223")

  modparam("nathelper", "received_avp", "$avp(received)")

  modparam("uac", "auth_username_avp", "$avp(auser)")
  modparam("uac", "auth_password_avp", "$avp(apass)")
  modparam("uac", "auth_realm_avp", "$avp(arealm)")

  ####### Routing ########

  request_route {

      xlog("L_INFO", ">>> $rm from $si:$sp user=$fU ruri=$ru\n");

      if (!mf_process_maxfwd_header("10")) {
          sl_send_reply("483", "Too Many Hops");
          exit;
      }

      if (!sanity_check("1511", "7")) {
          sl_send_reply("400", "Bad Request");
          exit;
      }

      # --- In-dialog requests ---
      if (has_totag()) {
          if (loose_route()) {
              # Route in-dialog requests to the correct destination:
              # 1. R-URI = tunnel IP → lookup to get existing TLS connection
              # 2. R-URI = myself (GRUU) → lookup to find the actual contact
              if ($rd =~ "^10\.7\.0\." || $ru =~ "10\.7\.0\." || uri == myself) {
                  if (uri == myself || $rd =~ "^10\.7\.0\.") {
                      $rd = "sip.rtegroup.ie";
                  }
                  if (!lookup("location")) {
                      xlog("L_WARN", "in-dialog lookup failed for $rU@$rd\n");
                  }
              }
              # Absorb in-dialog UPDATE with SDP - prevents RTPEngine ICE restart
              # that destroys the established dual-interface media path
              if (is_method("UPDATE") && has_body("application/sdp")) {
                  xlog("L_INFO", "Absorbing in-dialog UPDATE from $si - media path preserved\n");
                  sl_send_reply("200", "OK");
                  exit;
              }
              # Skip RTPEngine for in-dialog re-INVITE/ACK — the initial
              # offer/answer already set up the media path. Re-processing
              # causes "Not switching" errors that break audio.
              # Just relay the SDP as-is.
              if (is_method("BYE")) {
                  rtpengine_delete();
              }
              t_on_reply("MANAGE_REPLY");
              t_relay();
              exit;
          }

          if (is_method("ACK")) {
              # ACK to 2xx — route via existing TLS connection
              if ($rd =~ "^10\.7\.0\." || $ru =~ "10\.7\.0\.") {
                  $rd = "sip.rtegroup.ie";
                  if (!lookup("location")) {
                      xlog("L_WARN", "ACK lookup failed for $rU@$rd\n");
                  }
              }
              t_relay();
              exit;
          }
          sl_send_reply("481", "Call/Transaction Does Not Exist");
          exit;
      }

      # --- Initial requests ---

      if (is_method("CANCEL")) {
          if (t_check_trans()) {
              rtpengine_delete();
              t_relay();
          }
          exit;
      }

      t_check_trans();

      force_rport();
      # Only fix Contact for non-INVITE/BYE — those need original Contact for dialog routing.
      if (!is_method("INVITE|BYE")) {
          fix_nated_contact();
      }

      if (is_method("REGISTER")) {
          route(REGISTER);
          exit;
      }

      if (is_method("INVITE")) {
          if ($fd == "pstn.twilio.com") {
              route(PSTN_IN);
              exit;
          }
          if ($fd == "rte.pstn.twilio.com") {
              route(PSTN_IN);
              exit;
          }
          route(INVITE);
          exit;
      }

      if (is_method("OPTIONS")) {
          sl_send_reply("200", "OK");
          exit;
      }

      sl_send_reply("405", "Method Not Allowed");
      exit;
  }

  ####### Determine caller and callee RTPEngine interface #######
  #
  # Sets $avp(rtpe_flags) with from-interface/to-interface parameters.
  # from-interface = interface for the side that sent this SDP (caller)
  # to-interface = interface for the side that will receive this SDP (callee)
  # Only needed on the offer — RTPEngine remembers for the answer.
  #
  # Named interfaces in RTPEngine:
  #   public = 10.10.0.133!54.220.131.205  (internet-facing)
  #   tunnel = 10.7.0.1                     (bond tunnel)

  route[SET_RTPE_DIRECTION] {
      # Determine caller interface from source IP
      if ($si =~ "^10\.7\.0\.") {
          $avp(caller_dir) = "tunnel";
      } else {
          $avp(caller_dir) = "public";
      }

      # In-dialog: sender's interface is from-interface, far side is to-interface
      if (has_totag()) {
          if ($si =~ "^10\.7\.0\.") {
              $avp(rtpe_flags) = "from-interface=tunnel to-interface=public";
          } else {
              $avp(rtpe_flags) = "from-interface=public to-interface=tunnel";
          }
          xlog("L_INFO", "In-dialog RTPEngine: $avp(rtpe_flags)\n");
          return;
      }

      # Initial INVITE: determine callee interface from contact IP
      if ($avp(callee_ip) =~ "^10\.7\.0\.") {
          $avp(callee_dir) = "tunnel";
      } else {
          $avp(callee_dir) = "public";
      }

      $avp(rtpe_flags) = "from-interface=" + $avp(caller_dir) + " to-interface=" + $avp(callee_dir);
      xlog("L_INFO", "RTPEngine: from=$avp(caller_dir) to=$avp(callee_dir) flags=$avp(rtpe_flags)\n");
  }

  ####### REGISTER ########

  route[REGISTER] {
      if (!www_authorize("sip.rtegroup.ie", "subscriber")) {
          www_challenge("sip.rtegroup.ie", "0");
          exit;
      }
      # Manually set received AVP for connection reuse.
      $avp(received) = "sip:" + $si + ":" + $sp + ";transport=tls";
      xlog("L_INFO", "REGISTER: received=$avp(received) for $tU from $si:$sp\n");
      if (!save("location")) {
          sl_send_reply("500", "Registration Failed");
          exit;
      }
      exit;
  }

  ####### INVITE ########

  route[INVITE] {
      if (!proxy_authorize("sip.rtegroup.ie", "subscriber")) {
          proxy_challenge("sip.rtegroup.ie", "0");
          exit;
      }
      consume_credentials();

      # Check if dialling a PSTN number
      if ($rU =~ "^\+[1-9][0-9]+") {
          route(PSTN_OUT);
          exit;
      }
      if ($rU =~ "^00[1-9][0-9]+") {
          route(PSTN_OUT);
          exit;
      }
      if ($rU =~ "^[1-9][0-9][0-9][0-9][0-9][0-9][0-9]") {
          route(PSTN_OUT);
          exit;
      }

      # --- Local call ---

      if (proto == TLS) {
          route(CHECK_SRTP);
      }

      if (!lookup("location")) {
          xlog("L_WARN", "INVITE to $rU - destination not registered\n");
          sl_send_reply("404", "Not Found");
          exit;
      }

      # After lookup(), $du contains the callee contact URI.
      # Extract the callee contact IP for direction logic.
      # $du is like "sip:user@10.7.0.9:port;transport=tls"
      $avp(callee_ip) = $(du{uri.host});
      xlog("L_INFO", "Callee contact IP: $avp(callee_ip)\n");

      # Determine RTPEngine direction for caller and callee
      route(SET_RTPE_DIRECTION);

      record_route();

      if (proto == TLS) {
          rtpengine_offer("ICE=remove replace-origin RTP/SAVP codec-mask-PCMU codec-mask-PCMA codec-mask-G729 codec-mask-telephone-event $avp(rtpe_flags)");
      } else {
          rtpengine_offer("replace-origin $avp(rtpe_flags)");
      }

      t_on_reply("MANAGE_REPLY");
      t_on_failure("CALL_FAILURE");

      if (!t_relay()) {
          sl_reply_error();
      }
      exit;
  }

  ####### Inbound PSTN from Twilio ########

  route[PSTN_IN] {
      xlog("L_INFO", "Inbound PSTN from Twilio: $fU -> $rU\n");
      $rU = "user1";
      $rd = "sip.rtegroup.ie";

      if (!lookup("location")) {
          xlog("L_WARN", "Inbound PSTN - destination $rU not registered\n");
          sl_send_reply("480", "Temporarily Unavailable");
          exit;
      }

      # Twilio is always public side. Determine callee side from contact.
      $avp(callee_ip) = $(du{uri.host});
      xlog("L_INFO", "PSTN_IN callee contact IP: $avp(callee_ip)\n");

      # Twilio is always public. Determine callee interface.
      if ($avp(callee_ip) =~ "^10\.7\.0\.") {
          $avp(rtpe_flags) = "from-interface=public to-interface=tunnel";
      } else {
          $avp(rtpe_flags) = "from-interface=public to-interface=public";
      }
      xlog("L_INFO", "PSTN_IN RTPEngine: $avp(rtpe_flags)\n");

      record_route();
      rtpengine_offer("replace-origin ICE=remove RTP/SAVP $avp(rtpe_flags)");
      t_on_reply("MANAGE_REPLY");
      t_on_failure("CALL_FAILURE");

      if (!t_relay()) {
          sl_reply_error();
      }
      exit;
  }

  ####### Outbound PSTN via Twilio ########

  route[PSTN_OUT] {
      # Normalize to E.164
      if ($rU =~ "^00") {
          strip(2);
          prefix("+");
      }
      if (!($rU =~ "^\+")) {
          prefix("+");
      }

      xlog("L_INFO", "PSTN outbound: $fU calling $rU via Twilio\n");

      # Set caller ID to Twilio number
      $fU = "+14784436024";

      # Caller interface: tunnel or public. Callee (Twilio) is always public.
      if ($si =~ "^10\.7\.0\.") {
          $avp(rtpe_flags) = "from-interface=tunnel to-interface=public";
      } else {
          $avp(rtpe_flags) = "from-interface=public to-interface=public";
      }
      xlog("L_INFO", "PSTN_OUT RTPEngine: $avp(rtpe_flags)\n");

      record_route();

      # RTPEngine - modify SDP for Twilio
      rtpengine_offer("replace-origin ICE=remove RTP/SAVP SDES-pad SDES-only-AES_CM_128_HMAC_SHA1_80 $avp(rtpe_flags)");

      # Set destination to Twilio trunk
      $rd = "rte.pstn.twilio.com";
      $du = "sip:rte.pstn.twilio.com:5061;transport=tls";
      force_send_socket(tls:0.0.0.0:5061);

      # Store credentials for Twilio 407 challenge
      $avp(auser) = "kamailio";
      $avp(apass) = "Tighmaceoghan1!";
      $avp(arealm) = "sip.twilio.com";

      # Strip headers that Twilio rejects
      remove_hf("Route");
      remove_hf("Session-Expires");
      remove_hf("Min-SE");

      t_on_reply("MANAGE_REPLY");
      t_on_failure("TWILIO_AUTH");

      if (!t_relay()) {
          sl_reply_error();
      }
      exit;
  }

  ####### Check for SRTP offer ########

  route[CHECK_SRTP] {
      if (!search_body("a=crypto") && !search_body("a=fingerprint")) {
          xlog("L_WARN", "TLS call from $fU without SRTP offer - rejecting\n");
          sl_send_reply("488", "Not Acceptable Here - SRTP Required");
          exit;
      }
  }

  ####### Reply handling ########

  onreply_route[MANAGE_REPLY] {
      # Fix Contact in replies from tunnel clients only.
      # Without this, the ACK/BYE uses the Contact port from the 200 OK
      # which differs from the TLS connection port → connection fails.
      if ($si =~ "^10\.7\.0\.") {
          fix_nated_contact();
      }

      if (status =~ "[12][0-9][0-9]" && has_body("application/sdp")) {
          # No direction/interface flags on answer — RTPEngine remembers from offer.
          rtpengine_answer("ICE=remove replace-origin");
      }
  }

  ####### Failure handling ########

  failure_route[CALL_FAILURE] {
      if (t_is_canceled()) {
          rtpengine_delete();
          exit;
      }
  }

  ####### Twilio 407 auth handling ########

  failure_route[TWILIO_AUTH] {
      if (t_is_canceled()) {
          rtpengine_delete();
          exit;
      }

      xlog("L_WARN", "Twilio failure: status=$rs reason=$rr\n");

      if (t_check_status("407")) {
          xlog("L_INFO", "Twilio 407 challenge - authenticating\n");
          uac_auth();
          rtpengine_offer("replace-origin ICE=remove RTP/SAVP SDES-pad SDES-only-AES_CM_128_HMAC_SHA1_80 $avp(rtpe_flags)");
          t_on_reply("MANAGE_REPLY");
          t_on_failure("CALL_FAILURE");
          t_relay();
          exit;
      }
  }
