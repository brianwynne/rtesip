# /etc/chrony/chrony.conf — NTP configuration for RTE SIP Reporter

# Public NTP pool servers
pool 0.pool.ntp.org iburst
pool 1.pool.ntp.org iburst
pool 2.pool.ntp.org iburst
pool 3.pool.ntp.org iburst

# Record the rate at which the system clock gains/loses time
driftfile /var/lib/chrony/drift

# Allow the system clock to be stepped in the first three updates
# if its offset is larger than 1 second
makestep 1.0 3

# Enable kernel synchronisation of the real-time clock (RTC)
rtcsync

# Save NTS keys and cookies
ntsdumpdir /var/lib/chrony

# Log files location
logdir /var/log/chrony

# Enable hardware timestamping if the NIC supports it
#hwtimestamp *

# Allow NTP client access from local network (uncomment if needed)
#allow 192.168.0.0/16

# Serve time even if not synchronised to a time source
local stratum 10
