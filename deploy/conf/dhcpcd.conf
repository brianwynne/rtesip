# /etc/dhcpcd.conf — Base network configuration for RTE SIP Reporter
# The application appends static IP configuration below this block when needed.
# Do not edit below the "# --- rtesip managed ---" marker if present.

# Persist interface configuration
persistent

# Use the same DUID and IAID as set in DHCPv6 for DHCPv4
option rapid_commit

# Require dhcp_server_identifier to filter bogus offers
require dhcp_server_identifier

# Generate SLAAC address using the hardware address
slaac hwaddr

# Increase timeout for slow DHCP environments (broadcast trucks, etc.)
timeout 30
