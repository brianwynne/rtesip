# /etc/asound.conf — ALSA configuration for USB audio devices
# Uses dmix/dsnoop to avoid buzzing from raw hw: access in pjsua.

pcm.usb_play {
    type plug
    slave {
        pcm "dmix:LX3000,0"
        rate 48000
    }
}

pcm.usb_cap {
    type plug
    slave {
        pcm "dsnoop:LX3000,0"
        rate 48000
    }
}

pcm.!default {
    type asym
    playback.pcm usb_play
    capture.pcm usb_cap
}

ctl.!default {
    type hw
    card LX3000
}
