# /etc/asound.conf — ALSA configuration for RTE SIP Reporter
# Provides softvol pre-amplification and channel routing for broadcast audio.
# Designed for HiFiBerry DAC+ADC Pro and USB audio fallback.

# ---------------------------------------------------------------------------
# Hardware aliases
# ---------------------------------------------------------------------------

# HiFiBerry DAC+ADC Pro (I2S on RPi)
pcm.hifiberry {
    type hw
    card sndrpihifiberry
    device 0
    format S32_LE
    rate 48000
}

ctl.hifiberry {
    type hw
    card sndrpihifiberry
}

# USB audio device (first USB sound card found)
pcm.usbaudio {
    type hw
    card Device
    device 0
    format S16_LE
    rate 48000
}

ctl.usbaudio {
    type hw
    card Device
}

# ---------------------------------------------------------------------------
# Softvol — playback (up to +20 dB software gain)
# ---------------------------------------------------------------------------

pcm.softvol_play {
    type softvol
    slave.pcm "dmix:sndrpihifiberry,0"
    control {
        name "Playback Boost"
        card sndrpihifiberry
    }
    min_dB -40.0
    max_dB  20.0
    resolution 256
}

# ---------------------------------------------------------------------------
# Softvol — capture (up to +20 dB software gain)
# ---------------------------------------------------------------------------

pcm.softvol_cap {
    type softvol
    slave.pcm "dsnoop:sndrpihifiberry,0"
    control {
        name "Capture Boost"
        card sndrpihifiberry
    }
    min_dB -40.0
    max_dB  20.0
    resolution 256
}

# ---------------------------------------------------------------------------
# Channel routing PCMs
#   lr = normal stereo (left->left, right->right)
#   ll = left channel to both outputs
#   rr = right channel to both outputs
#   rl = swap channels (right->left, left->right)
# ---------------------------------------------------------------------------

pcm.lr {
    type route
    slave.pcm "softvol_play"
    slave.channels 2
    ttable.0.0 1.0
    ttable.1.1 1.0
}

pcm.ll {
    type route
    slave.pcm "softvol_play"
    slave.channels 2
    ttable.0.0 1.0
    ttable.0.1 1.0
}

pcm.rr {
    type route
    slave.pcm "softvol_play"
    slave.channels 2
    ttable.1.0 1.0
    ttable.1.1 1.0
}

pcm.rl {
    type route
    slave.pcm "softvol_play"
    slave.channels 2
    ttable.0.1 1.0
    ttable.1.0 1.0
}

# ---------------------------------------------------------------------------
# Asymmetric full-duplex — combines softvol play + softvol capture
# ---------------------------------------------------------------------------

pcm.duplex {
    type asym
    playback.pcm "softvol_play"
    capture.pcm  "softvol_cap"
}

# ---------------------------------------------------------------------------
# Default device
# ---------------------------------------------------------------------------

pcm.!default {
    type asym
    playback.pcm "softvol_play"
    capture.pcm  "softvol_cap"
}

ctl.!default {
    type hw
    card sndrpihifiberry
}
